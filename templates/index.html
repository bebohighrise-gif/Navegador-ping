<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nocturna X-God Browser</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; --panel: #141414; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); color:#fff; display:flex; height:100vh; overflow:hidden; }
        aside { width:360px; background:var(--panel); border-right:1px solid #222; padding:20px; display:flex; flex-direction:column; box-shadow: 10px 0 30px #000; }
        input, textarea { background:#000; border:1px solid #333; color:var(--neon); padding:12px; width:100%; border-radius:8px; margin-bottom:10px; font-family: monospace; outline:none; }
        .btn { background:var(--neon); color:#000; border:none; padding:12px; font-weight:900; width:100%; cursor:pointer; border-radius:8px; text-transform:uppercase; transition:0.3s; }
        .btn:hover { box-shadow: 0 0 20px var(--neon); }
        main { flex:1; display:flex; flex-direction:column; }
        iframe { flex:1; border:none; background:#fff; border-radius:20px 20px 0 0; }
    </style>
</head>
<body>
    <aside>
        <h2 style="color:var(--neon); text-align:center;">🌌 NOCTURNA GOD</h2>
        <input type="text" id="url-nav" placeholder="Escribe URL (ej: google.com)">
        <button class="btn" style="margin-bottom:20px;" onclick="navegar()">IR A WEB</button>
        
        <input type="text" id="repo" placeholder="URL GitHub para clonar">
        <input type="text" id="name" placeholder="Nombre del proyecto">
        <button class="btn" onclick="deploy()">Auto-Desplegar</button>
        
        <h3 style="font-size:12px; color:#555; margin-top:20px;">PERSISTENCIA (Auto-Save)</h3>
        <textarea id="data-area" rows="10" placeholder="Pega aquí tus datos importantes..."></textarea>
        <button class="btn" style="background:#fff; font-size:11px;" onclick="descargar()">Backup JSON</button>
    </aside>

    <main>
        <div style="background:#111; padding:8px 20px; font-size:11px; color:var(--neon);">MODO_PROXY_ACTIVO // RENDER_SECURE</div>
        <iframe id="ifr" src="/proxy?url=https://www.google.com"></iframe>
    </main>

    <audio id="beep" src="https://assets.mixkit.co"></audio>

    <script>
        const area = document.getElementById('data-area');
        area.value = localStorage.getItem('nocturna_v8') || "";

        setInterval(() => {
            if(area.value !== localStorage.getItem('nocturna_v8')) {
                localStorage.setItem('nocturna_v8', area.value);
                document.getElementById('beep').play().catch(()=>{});
            }
        }, 60000);

        function navegar() {
            let url = document.getElementById('url-nav').value;
            if(!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('ifr').src = '/proxy?url=' + encodeURIComponent(url);
        }

        async function deploy() {
            const repo = document.getElementById('repo').value;
            const name = document.getElementById('name').value;
            const res = await fetch('/deploy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({repo, name})
            });
            const d = await res.json();
            alert(d.msg);
        }

        function descargar() {
            const blob = new Blob([area.value], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `backup_${Date.now()}.json`; a.click();
        }
    </script>
</body>
</html>
