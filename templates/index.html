<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Navegador Web Avanzado 24/7</title>
    <style>
        body { font-family: Arial; margin: 10px; background: #f2f2f2; }
        iframe { width: 100%; height: 400px; border: 1px solid #ccc; margin-bottom: 10px; }
        input { width: 80%; padding: 5px; font-size: 16px; }
        button { padding: 5px 10px; font-size: 16px; }
        .iframe-container { position: relative; }
        .cerrar-btn { position: absolute; right: 10px; top: 10px; background: red; color: white; border: none; padding: 2px 6px; cursor: pointer; }
        .ping-result { margin: 10px 0; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <h1>Mi Navegador Web Avanzado 24/7</h1>

    <!-- Abrir nuevas webs -->
    <form method="POST">
        <input type="text" name="url" placeholder="Escribe URL o búsqueda">
        <button type="submit">Abrir</button>
    </form>

    <!-- Apartado Ping -->
    <h2>Ping a URL</h2>
    <form method="POST">
        <input type="text" name="ping_url" placeholder="Escribe URL para hacer ping">
        <button type="submit">Ping</button>
    </form>

    {% if ping_result %}
        <div class="ping-result">{{ ping_result }}</div>
    {% endif %}

    <!-- Iframes con webs abiertas -->
    {% for url in urls %}
        <div class="iframe-container">
            <form action="/cerrar/{{ loop.index0 }}" method="get" style="display:inline;">
                <button class="cerrar-btn">X</button>
            </form>
            <iframe src="{{ url }}"></iframe>
        </div>
    {% endfor %}
</body>
</html>
