<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturna OS - Next Generation Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --void-black: #0a0a0f;
            --deep-space: #12121a;
            --midnight: #1a1a26;
            --shadow-blue: #1e1e2e;
            --border-glow: #2a2a3e;
            --neon-cyan: #00fff5;
            --electric-blue: #0084ff;
            --quantum-purple: #b066ff;
            --plasma-pink: #ff006e;
            --aurora-green: #00ff94;
            --text-primary: #e8e8f2;
            --text-secondary: #9999b3;
            --text-tertiary: #666680;
            --glass-bg: rgba(26, 26, 38, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--void-black);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 132, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(176, 102, 255, 0.06) 0%, transparent 50%);
            animation: cosmicShift 20s ease-in-out infinite;
        }

        @keyframes cosmicShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .chrome-bar {
            position: relative;
            z-index: 100;
            height: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .hamburger-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--shadow-blue);
            border: 1px solid var(--border-glow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .hamburger-btn:hover {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 245, 0.2);
        }

        .hamburger-icon {
            width: 20px;
            height: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hamburger-icon span {
            width: 100%;
            height: 2px;
            background: var(--text-secondary);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .sidebar-open .hamburger-icon span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .sidebar-open .hamburger-icon span:nth-child(2) {
            opacity: 0;
        }

        .sidebar-open .hamburger-icon span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 255, 245, 0.3);
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .omnibox-container {
            flex: 1;
            max-width: 720px;
            margin: 0 auto;
        }

        .omnibox {
            width: 100%;
            height: 44px;
            background: var(--deep-space);
            border: 1.5px solid var(--border-glow);
            border-radius: 22px;
            padding: 0 20px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .omnibox:focus {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0, 255, 245, 0.1);
        }

        .tool-btn {
            padding: 8px 16px;
            background: var(--shadow-blue);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .tool-btn:hover {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            box-shadow: 0 4px 20px rgba(0, 255, 245, 0.2);
        }

        .sidebar-menu {
            position: fixed;
            top: 64px;
            left: 0;
            width: 320px;
            height: calc(100vh - 64px);
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            border-right: 1px solid var(--glass-border);
            z-index: 95;
            transform: translateX(-100%);
            transition: transform 0.4s;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar-menu.active {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(5px);
            z-index: 94;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-content {
            padding: 16px;
        }

        .sidebar-item {
            width: 100%;
            background: var(--deep-space);
            border: 1.5px solid var(--border-glow);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
        }

        .sidebar-item:hover {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            transform: translateX(8px);
        }

        .sidebar-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--electric-blue), var(--quantum-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .sidebar-item-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .sidebar-item-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .side-panel {
            position: fixed;
            top: 64px;
            height: calc(100vh - 64px);
            width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .side-panel.left {
            left: 0;
            border-left: none;
            transform: translateX(-100%);
        }

        .side-panel.right {
            right: 0;
            border-right: none;
            transform: translateX(100%);
        }

        .side-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            padding: 28px 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .panel-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .panel-content::-webkit-scrollbar {
            width: 8px;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: var(--border-glow);
            border-radius: 4px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            height: 48px;
            background: var(--deep-space);
            border: 1.5px solid var(--border-glow);
            border-radius: 12px;
            padding: 0 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0, 255, 245, 0.1);
        }

        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue));
            color: var(--void-black);
            box-shadow: 0 8px 24px rgba(0, 255, 245, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 255, 245, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--aurora-green), var(--neon-cyan));
            color: var(--void-black);
        }

        .log-terminal {
            background: var(--void-black);
            border: 1.5px solid var(--border-glow);
            border-radius: 12px;
            padding: 16px;
            height: 240px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--aurora-green);
            margin-top: 16px;
        }

        .tab-item {
            background: var(--deep-space);
            border: 1.5px solid var(--border-glow);
            border-radius: 12px;
            padding: 16px;
            padding-right: 50px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
        }

        .tab-item:hover {
            background: var(--midnight);
            border-color: var(--neon-cyan);
            box-shadow: 0 8px 24px rgba(0, 255, 245, 0.2);
        }

        .tab-delete-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 8px;
            color: var(--plasma-pink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            z-index: 10;
        }

        .tab-item:hover .tab-delete-btn {
            opacity: 1;
        }

        .tab-delete-btn:hover {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--plasma-pink);
            transform: translateY(-50%) scale(1.1);
        }

        .tab-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--electric-blue), var(--quantum-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .tab-url {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tab-time {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        #home {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 64px);
        }

        .home-logo {
            font-family: 'Syne', sans-serif;
            font-size: 96px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-cyan), var(--electric-blue), var(--quantum-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 60px;
        }

        #web-view {
            position: relative;
            z-index: 1;
            display: none;
            height: calc(100vh - 64px);
            background: white;
        }

        #web-view.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        #setup {
            display: none;
        }

        #setup.active {
            display: block;
        }

        .ping-item {
            background: var(--deep-space);
            border: 1.5px solid var(--border-glow);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .ping-status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .ping-status.online {
            background: rgba(0, 255, 148, 0.15);
            color: var(--aurora-green);
        }

        .ping-status.offline {
            background: rgba(255, 0, 110, 0.15);
            color: var(--plasma-pink);
        }

        .ping-action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 8px;
        }

        .ping-action-btn.edit {
            background: var(--shadow-blue);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
        }

        .ping-action-btn.delete {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: var(--plasma-pink);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>

    <!-- Chrome Bar -->
    <div class="chrome-bar">
        <button class="hamburger-btn" onclick="toggleSidebar()" id="hamburger-btn">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <div class="logo-container" onclick="goHome()">
            <div class="logo-icon">N</div>
            <div class="logo-text">NOCTURNA</div>
        </div>

        <div class="omnibox-container">
            <input type="text" class="omnibox" id="q" placeholder="Busca en Google o escribe una URL..." onkeypress="handle(event)">
        </div>

        <button class="tool-btn" onclick="togglePanel('tabs-panel')" id="tabs-btn">
            <span>📑</span>
            <span>Historial</span>
        </button>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-header">
            <div class="sidebar-title">Herramientas</div>
        </div>
        <div class="sidebar-content">
            <button class="sidebar-item" onclick="openSection('deploy-panel')">
                <span class="sidebar-icon">🚀</span>
                <div>
                    <div class="sidebar-item-title">Deploy Engine</div>
                    <div class="sidebar-item-desc">Desplegar proyectos de GitHub</div>
                </div>
            </button>
            <button class="sidebar-item" onclick="openSection('monitoring-panel')">
                <span class="sidebar-icon">📡</span>
                <div>
                    <div class="sidebar-item-title">Monitoreo</div>
                    <div class="sidebar-item-desc">Ping de servicios en tiempo real</div>
                </div>
            </button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Deploy Panel -->
    <div class="side-panel left" id="deploy-panel">
        <div class="panel-header">
            <div class="panel-title">⚡ Deploy Engine</div>
            <div class="panel-subtitle">Analiza y despliega repositorios de GitHub</div>
        </div>
        <div class="panel-content">
            <div class="input-group">
                <label class="input-label">GitHub Repository URL</label>
                <input type="text" class="input-field" id="repo" placeholder="https://github.com/username/repository">
            </div>
            <button class="btn btn-primary" onclick="analizar()">🔍 Analizar Repositorio</button>
            
            <div id="setup">
                <div class="input-group">
                    <label class="input-label">Nombre del Proyecto</label>
                    <input type="text" class="input-field" id="p-name" placeholder="my-project">
                </div>
                <div class="input-group">
                    <label class="input-label">Comando de Instalación</label>
                    <input type="text" class="input-field" id="p-inst" placeholder="npm install">
                </div>
                <div class="input-group">
                    <label class="input-label">Comando de Inicio</label>
                    <input type="text" class="input-field" id="p-start" placeholder="npm start">
                </div>
                <button class="btn btn-success" onclick="lanzar()">▶️ Lanzar Aplicación</button>
                <div class="log-terminal" id="logs">[NOCTURNA] Esperando logs...</div>
            </div>
        </div>
    </div>

    <!-- Monitoring Panel -->
    <div class="side-panel left" id="monitoring-panel">
        <div class="panel-header">
            <div class="panel-title">📡 Monitoreo de Servicios</div>
            <div class="panel-subtitle">Configura endpoints para monitorear</div>
        </div>
        <div class="panel-content">
            <div class="input-group">
                <label class="input-label">URL del Endpoint</label>
                <input type="text" class="input-field" id="ping-url" placeholder="https://api.example.com/health">
            </div>
            <div class="input-group">
                <label class="input-label">Nombre del Servicio</label>
                <input type="text" class="input-field" id="ping-name" placeholder="API Principal">
            </div>
            <button class="btn btn-primary" onclick="addPing()">➕ Agregar Monitoreo</button>
            <div id="ping-list"></div>
        </div>
    </div>

    <!-- Tabs Panel -->
    <div class="side-panel right" id="tabs-panel">
        <div class="panel-header">
            <div class="panel-title">🌐 Historial</div>
            <div class="panel-subtitle">Pestañas activas de esta sesión</div>
        </div>
        <div class="panel-content">
            <div id="tab-list"></div>
        </div>
    </div>

    <!-- Home View -->
    <div id="home">
        <div class="home-logo">NOCTURNA</div>
        <div class="omnibox-container">
            <input type="text" class="omnibox" placeholder="Busca en Google o escribe una URL..." onkeypress="handle(event)">
        </div>
    </div>

    <!-- Web View -->
    <div id="web-view">
        <div id="frame-slot"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h3>✏️ Editar Monitoreo</h3>
            <div class="input-group">
                <label class="input-label">Nombre</label>
                <input type="text" class="input-field" id="edit-ping-name">
            </div>
            <div class="input-group">
                <label class="input-label">URL</label>
                <input type="text" class="input-field" id="edit-ping-url">
            </div>
            <button class="btn btn-primary" onclick="saveEdit()">💾 Guardar</button>
            <button class="btn btn-secondary" onclick="closeEditModal()" style="margin-top: 10px; background: var(--shadow-blue); color: var(--text-primary);">Cancelar</button>
        </div>
    </div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let tabs = [];
        let tempFolder = "";
        let logUpdateInterval = null;
        let pingServices = [];
        let pingIntervals = {};
        let editingPingId = null;

        // ===== PERSISTENCIA LOCAL STORAGE =====
        const STORAGE_KEYS = {
            TABS: 'nocturna_tabs',
            PINGS: 'nocturna_pings'
        };

        function saveToStorage(key, data) {
            try {
                const jsonData = JSON.stringify(data);
                localStorage.setItem(key, jsonData);
                console.log(`💾 Guardado ${key}:`, data.length, 'items');
                return true;
            } catch (e) {
                console.error('❌ Error guardando en localStorage:', e);
                // Si el storage está lleno, limpiar datos viejos
                if (e.name === 'QuotaExceededError') {
                    console.warn('⚠️ LocalStorage lleno, limpiando...');
                    // Guardar solo los últimos 50 tabs
                    if (key === STORAGE_KEYS.TABS && data.length > 50) {
                        const reduced = data.slice(-50);
                        localStorage.setItem(key, JSON.stringify(reduced));
                        console.log('✅ Guardados últimos 50 tabs');
                        return true;
                    }
                }
                return false;
            }
        }

        function loadFromStorage(key, defaultValue = null) {
            try {
                const data = localStorage.getItem(key);
                if (data === null || data === undefined) {
                    console.log(`📭 No hay datos guardados para ${key}`);
                    return defaultValue;
                }
                const parsed = JSON.parse(data);
                console.log(`📂 Cargado ${key}:`, parsed.length, 'items');
                return parsed;
            } catch (e) {
                console.error('❌ Error cargando de localStorage:', e);
                console.warn('🔄 Usando valores por defecto');
                return defaultValue;
            }
        }

        function clearStorage() {
            try {
                localStorage.removeItem(STORAGE_KEYS.TABS);
                localStorage.removeItem(STORAGE_KEYS.PINGS);
                console.log('🗑️ Storage limpiado');
                return true;
            } catch (e) {
                console.error('❌ Error limpiando storage:', e);
                return false;
            }
        }

        // Verificar que localStorage funciona
        function testLocalStorage() {
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                console.log('✅ LocalStorage disponible y funcional');
                return true;
            } catch (e) {
                console.error('❌ LocalStorage NO disponible:', e);
                alert('⚠️ LocalStorage no está disponible. Los datos no se guardarán.');
                return false;
            }
        }

        // Test al inicio
        testLocalStorage();

        // Cargar datos al iniciar (ANTES de window.load)
        tabs = loadFromStorage(STORAGE_KEYS.TABS, []);
        pingServices = loadFromStorage(STORAGE_KEYS.PINGS, []);

        // ===== SIDEBAR =====
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-menu');
            const overlay = document.getElementById('sidebar-overlay');
            const btn = document.getElementById('hamburger-btn');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            btn.classList.toggle('sidebar-open');
        }

        function openSection(sectionId) {
            toggleSidebar();
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
            setTimeout(() => {
                document.getElementById(sectionId).classList.add('active');
            }, 300);
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const allPanels = document.querySelectorAll('.side-panel');
            
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
            } else {
                allPanels.forEach(p => p.classList.remove('active'));
                panel.classList.add('active');
            }
        }

        // ===== NAVEGACIÓN =====
        function handle(e) {
            if (e.key === 'Enter') {
                const value = e.target.value.trim();
                if (value) {
                    openWeb(value);
                    e.target.value = '';
                }
            }
        }

        function openWeb(v) {
            if (!v) return;
            
            let url = v.includes('.') && !v.includes(' ') 
                ? (v.startsWith('http') ? v : 'https://' + v)
                : 'https://www.google.com/search?q=' + encodeURIComponent(v);
            
            const id = "w" + Date.now();
            tabs.push({
                id,
                url,
                time: new Date().toLocaleTimeString()
            });
            
            // GUARDAR INMEDIATAMENTE
            saveToStorage(STORAGE_KEYS.TABS, tabs);
            
            const ifr = document.createElement('iframe');
            ifr.id = id;
            ifr.src = "/proxy?url=" + encodeURIComponent(url);
            ifr.style.display = "none";
            document.getElementById('frame-slot').appendChild(ifr);
            
            renderTabs();
            switchW(id);
        }

        function switchW(id) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('web-view').classList.add('active');
            
            document.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
            const frame = document.getElementById(id);
            if (frame) frame.style.display = 'block';
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            
            if (tabs.length === 0) {
                list.innerHTML = '<div class="empty-state">📭<br>No hay pestañas abiertas</div>';
                return;
            }
            
            list.innerHTML = '';
            tabs.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'tab-item';
                
                let domain = '';
                try {
                    domain = new URL(t.url).hostname;
                } catch {
                    domain = t.url.substring(0, 30);
                }
                
                div.innerHTML = `
                    <div class="tab-icon">🌐</div>
                    <div style="flex: 1;">
                        <div class="tab-url">${domain}</div>
                        <div class="tab-time">${t.time}</div>
                    </div>
                    <button class="tab-delete-btn" onclick="deleteTab('${t.id}', event)">🗑️</button>
                `;
                
                div.addEventListener('click', (e) => {
                    if (!e.target.closest('.tab-delete-btn')) {
                        switchW(t.id);
                    }
                });
                
                list.appendChild(div);
            });
            
            saveToStorage(STORAGE_KEYS.TABS, tabs);
        }

        function deleteTab(tabId, event) {
            event.stopPropagation();
            
            tabs = tabs.filter(t => t.id !== tabId);
            const iframe = document.getElementById(tabId);
            if (iframe) iframe.remove();
            
            // GUARDAR INMEDIATAMENTE
            saveToStorage(STORAGE_KEYS.TABS, tabs);
            
            renderTabs();
            
            if (tabs.length === 0) {
                goHome();
            }
        }

        function goHome() {
            document.getElementById('web-view').classList.remove('active');
            document.getElementById('home').style.display = 'flex';
        }

        // ===== DEPLOY =====
        async function analizar() {
            const repo = document.getElementById('repo').value.trim();
            if (!repo) return alert('Ingresa una URL de repositorio');
            
            try {
                const res = await fetch('/detect_and_setup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({repo})
                });
                
                const d = await res.json();
                
                if (d.status === 'ok') {
                    document.getElementById('setup').classList.add('active');
                    document.getElementById('p-inst').value = d.inst || '';
                    document.getElementById('p-start').value = d.start || '';
                    tempFolder = d.folder || '';
                } else {
                    alert('Error: ' + d.msg);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function lanzar() {
            const name = document.getElementById('p-name').value.trim();
            const inst = document.getElementById('p-inst').value.trim();
            const start = document.getElementById('p-start').value.trim();
            
            if (!name || !start) return alert('Completa los campos requeridos');
            
            try {
                await fetch('/deploy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        folder: tempFolder,
                        name, inst, start
                    })
                });
                
                if (logUpdateInterval) clearInterval(logUpdateInterval);
                
                logUpdateInterval = setInterval(async () => {
                    try {
                        const r = await fetch(`/get_logs/${name}`);
                        const data = await r.json();
                        document.getElementById('logs').innerText = data.text || 'Sin logs';
                    } catch (e) {
                        console.error('Error logs:', e);
                    }
                }, 5000);
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // ===== PING MONITORING =====
        function addPing() {
            const url = document.getElementById('ping-url').value.trim();
            const name = document.getElementById('ping-name').value.trim();
            
            if (!url || !name) return alert('Completa todos los campos');
            
            const ping = {
                id: 'ping_' + Date.now(),
                name, url,
                status: 'checking',
                responseTime: '--',
                uptime: '100%',
                lastCheck: new Date().toLocaleTimeString(),
                checks: []
            };
            
            pingServices.push(ping);
            document.getElementById('ping-url').value = '';
            document.getElementById('ping-name').value = '';
            
            // GUARDAR INMEDIATAMENTE
            saveToStorage(STORAGE_KEYS.PINGS, pingServices);
            
            renderPings();
            startPingMonitoring(ping.id);
        }

        function renderPings() {
            const list = document.getElementById('ping-list');
            
            if (pingServices.length === 0) {
                list.innerHTML = '<div class="empty-state">📡<br>No hay servicios monitoreados</div>';
                return;
            }
            
            list.innerHTML = '';
            pingServices.forEach(p => {
                const div = document.createElement('div');
                div.className = 'ping-item';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <strong>${p.name}</strong>
                        <span class="ping-status ${p.status}">${p.status.toUpperCase()}</span>
                    </div>
                    <div style="font-size: 12px; color: var(--text-secondary);">${p.url}</div>
                    <div style="margin-top: 10px; font-size: 12px;">
                        <span>⚡ ${p.responseTime}ms</span>
                        <span style="margin-left: 15px;">📊 ${p.uptime} uptime</span>
                    </div>
                    <div style="margin-top: 10px;">
                        <button class="ping-action-btn edit" onclick="editPing('${p.id}')">✏️ Editar</button>
                        <button class="ping-action-btn delete" onclick="deletePing('${p.id}')">🗑️ Eliminar</button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            saveToStorage(STORAGE_KEYS.PINGS, pingServices);
        }

        function startPingMonitoring(pingId) {
            if (pingIntervals[pingId]) clearInterval(pingIntervals[pingId]);
            
            checkPing(pingId);
            pingIntervals[pingId] = setInterval(() => checkPing(pingId), 30000);
        }

        async function checkPing(pingId) {
            const service = pingServices.find(s => s.id === pingId);
            if (!service) return;
            
            try {
                const res = await fetch(`/ping?url=${encodeURIComponent(service.url)}`);
                const data = await res.json();
                
                service.status = data.ok ? 'online' : 'offline';
                service.responseTime = data.response_time || '--';
                service.lastCheck = new Date().toLocaleTimeString();
                service.checks.push(data.ok);
                
                if (service.checks.length > 100) service.checks.shift();
                
                const success = service.checks.filter(c => c).length;
                service.uptime = ((success / service.checks.length) * 100).toFixed(1) + '%';
            } catch (e) {
                service.status = 'offline';
                service.responseTime = '--';
            }
            
            renderPings();
        }

        function editPing(pingId) {
            const service = pingServices.find(s => s.id === pingId);
            if (!service) return;
            
            editingPingId = pingId;
            document.getElementById('edit-ping-name').value = service.name;
            document.getElementById('edit-ping-url').value = service.url;
            document.getElementById('edit-modal').classList.add('active');
        }

        function saveEdit() {
            if (!editingPingId) return;
            
            const service = pingServices.find(s => s.id === editingPingId);
            if (!service) return;
            
            service.name = document.getElementById('edit-ping-name').value.trim();
            service.url = document.getElementById('edit-ping-url').value.trim();
            
            if (!service.name || !service.url) return alert('Completa todos los campos');
            
            renderPings();
            closeEditModal();
            checkPing(editingPingId);
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            editingPingId = null;
        }

        function deletePing(pingId) {
            if (!confirm('¿Eliminar este monitoreo?')) return;
            
            if (pingIntervals[pingId]) {
                clearInterval(pingIntervals[pingId]);
                delete pingIntervals[pingId];
            }
            
            pingServices = pingServices.filter(s => s.id !== pingId);
            renderPings();
        }

        // ===== INIT =====
        window.addEventListener('load', () => {
            console.log('🚀 Nocturna OS Iniciando...');
            
            // Cargar datos guardados
            tabs = loadFromStorage(STORAGE_KEYS.TABS, []);
            pingServices = loadFromStorage(STORAGE_KEYS.PINGS, []);
            
            console.log('📊 Datos cargados:');
            console.log('  - Tabs:', tabs.length);
            console.log('  - Pings:', pingServices.length);
            
            // Renderizar tabs
            renderTabs();
            
            // Recrear iframes de tabs guardados
            if (tabs.length > 0) {
                console.log('🔄 Recreando iframes de tabs guardados...');
                tabs.forEach(t => {
                    // Verificar si el iframe ya existe
                    if (!document.getElementById(t.id)) {
                        const ifr = document.createElement('iframe');
                        ifr.id = t.id;
                        ifr.src = "/proxy?url=" + encodeURIComponent(t.url);
                        ifr.style.display = "none";
                        document.getElementById('frame-slot').appendChild(ifr);
                        console.log('  ✅ Iframe recreado:', t.id);
                    }
                });
            }
            
            // Renderizar pings
            renderPings();
            
            // Reiniciar monitoreos guardados
            if (pingServices.length > 0) {
                console.log('📡 Reiniciando monitoreos...');
                pingServices.forEach(p => {
                    startPingMonitoring(p.id);
                    console.log('  ✅ Monitoreo iniciado:', p.name);
                });
            }
            
            console.log('✅ Nocturna OS listo');
        });

        // Guardar antes de cerrar la pestaña
        window.addEventListener('beforeunload', () => {
            console.log('💾 Guardando datos antes de cerrar...');
            saveToStorage(STORAGE_KEYS.TABS, tabs);
            saveToStorage(STORAGE_KEYS.PINGS, pingServices);
            console.log('✅ Datos guardados');
        });

        // Guardar periódicamente cada 30 segundos
        setInterval(() => {
            saveToStorage(STORAGE_KEYS.TABS, tabs);
            saveToStorage(STORAGE_KEYS.PINGS, pingServices);
            console.log('💾 Auto-guardado periódico');
        }, 30000);

        // Cerrar modal al click fuera
        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'edit-modal') closeEditModal();
        });
    </script>
</body>
</html>
